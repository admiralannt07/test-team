<!DOCTYPE html>
<html lang="en">
  <head>
    <title>AR PWA MVP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="./css/ar-style.css" />
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.rawgit.com/jeromeetienne/AR.js/1.7.6/aframe/build/aframe-ar.js"></script>
  </head>
  <body class="bg-black">
    <div class="hud flex items-center justify-between">
      <a href="./index.html" class="px-3 py-1 rounded-lg bg-white/80 text-slate-900 text-sm">Back</a>
      <div class="px-3 py-1 rounded-lg bg-white/80 text-slate-900 text-sm">Point camera to marker</div>
    </div>

    <!-- Scene AR -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      <!-- Marker preset (bisa ganti ke pattern kustom nanti) -->
      <a-marker preset="hiro">
        <a-entity gltf-model="./assets/models/candi.glb" position="0 0 0" scale="0.4 0.4 0.4" rotation="0 0 0">
        </a-entity>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>

    <script src="./js/ar-script.js"></script>
  </body>
</html>
